services:
  app:
    image: ghcr.io/magicarpy/ucladn-app:latest
    container_name: ucladn-app
    env_file:
      - .env
    volumes:
      - app_uploads:/app/backend/uploads
    environment:
      MYSQL_HOST: db
      REDIS_HOST: redis
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - ucladn_network
    restart: unless-stopped

  db:
    image: mysql:8.4.0
    container_name: ucladn-db
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASS}
      MYSQL_DATABASE: ${MYSQL_DB}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASS}
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - ucladn_network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  redis:
    image: redis:alpine
    container_name: ucladn-redis
    command:
      [
        "redis-server",
        "--user",
        "default",
        "off",
        "nopass",
        "-@all",
        "--user",
        "${REDIS_USER}",
        "on",
        ">${REDIS_PASS}",
        "~session:*",
        "-@all",
        "+get",
        "+set",
        "+del",
      ]
    env_file:
      - .env
    volumes:
      - redis_data:/data
    networks:
      - ucladn_network
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: caddy-proxy
    ports:
      - "80:80"
      - "443:443"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - ./certs:/etc/caddy/certs
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - ucladn_network
    depends_on:
      - app

volumes:
  db_data:
  redis_data:
  app_uploads:
  caddy_data:
  caddy_config:

networks:
  ucladn_network:
    driver: bridge
